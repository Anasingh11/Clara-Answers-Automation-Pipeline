version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: clara-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=clara2024
      - N8N_ENCRYPTION_KEY=clara_secret_key_2024
      - GENERIC_TIMEZONE=America/New_York
      - NODE_ENV=production
      # Allow n8n to execute local commands and access the filesystem
      - N8N_BLOCK_FS_WRITE_ACCESS=false
    volumes:
      - n8n_data:/home/node/.n8n
      - ./data:/data
      - ./outputs:/outputs
      - ./scripts:/scripts
      - ./templates:/templates
      - ./config.js:/app/config.js
      - ./package.json:/app/package.json
    working_dir: /app

volumes:
  n8n_data:
